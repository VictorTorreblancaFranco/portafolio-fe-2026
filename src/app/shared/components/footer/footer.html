<footer class="footer">
  <div class="page-shell footer__inner">
    <p>© {{ year }} {{ profile.name }}. Portafolio frontend construido con Angular.</p>
    <div>
      @for (link of socialLinks; track link.label) {
        <a [href]="link.url" target="_blank" rel="noreferrer">{{ link.label }}</a>
      }
    </div>
  </div>
</footer>
